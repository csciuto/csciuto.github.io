// ── AUDIO ──────────────────────────────────────────────────
let ac=null, masterGain=null;
function ea(){
  if(!ac){
    ac=new(AudioContext||webkitAudioContext)();
    masterGain=ac.createGain();
    masterGain.gain.value=1.0;
    masterGain.connect(ac.destination);
  }
}
function tone(f,d,t,v){ea();const o=ac.createOscillator(),g=ac.createGain();o.type=t||"square";o.frequency.setValueAtTime(f,ac.currentTime);g.gain.setValueAtTime(v||0.07,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);o.connect(g);g.connect(masterGain);o.start();o.stop(ac.currentTime+d);}
function noise(d,v){ea();const n=ac.sampleRate*d|0,b=ac.createBuffer(1,n,ac.sampleRate),a=b.getChannelData(0);for(let i=0;i<n;i++)a[i]=(Math.random()*2-1)*Math.exp(-i/(n*0.3));const s=ac.createBufferSource(),g=ac.createGain();s.buffer=b;g.gain.value=v||0.05;s.connect(g);g.connect(masterGain);s.start();}

function dC(c,x,y,col){const g=GL[c.toUpperCase()]||GL[" "];X.fillStyle=col;for(let ry=0;ry<g.length;ry++)for(let rx=0;rx<g[ry].length;rx++)if(g[ry][rx])X.fillRect(x+rx,y+ry,1,1);return 6;}
function dT(t,x,y,c){let p=x;for(const ch of t)p+=dC(ch,p,y,c);}
function tW(t){return t.length*6;}
function wrap(t,mw){const w=t.split(" "),ls=[];let l="";for(const s of w){const n=l?l+" "+s:s;if(tW(n)>mw&&l){ls.push(l);l=s;}else l=n;}if(l)ls.push(l);return ls;}

const colliders = {
  dining:   [],

  ],
  bedroom:  [],

const trashBarrelBox = {x:215, y:120, w:28, h:22, disabled:false};
colliders.kitchen.push(trashBarrelBox);
// Squeaky toy basket — always present (empty basket still blocks)
const basketBox = {x:150, y:150, w:22, h:12, disabled:false};
colliders.kitchen.push(basketBox);
// Dining table: no floor collision — cat walks under freely, jumps to get on top.

function collides(nx,ny,room){
  const cw=14,ch=18;
  const boxes=colliders[room].filter(b=>!b.disabled);
  for(const b of boxes){
    if(nx+cw>b.x && nx<b.x+b.w && ny+ch>b.y && ny<b.y+b.h) return true;
  }
  return false;
}

// ── ANIMATION SYSTEM ───────────────────────────────────────
// Special cat animations that play out over frames
let anim = {type:null, frame:0, maxFrames:0, onDone:null, jumpUp:false};

function startAnim(type, frames, doneCb, isJumpUp){
  anim = {type, frame:0, maxFrames:frames, onDone:doneCb||null, jumpUp:!!isJumpUp};
}

function tickAnim(){
  if(!anim.type) return;
  anim.frame++;
  if(anim.frame >= anim.maxFrames){
    const cb = anim.onDone;
    anim = {type:null,frame:0,maxFrames:0,onDone:null};
    if(cb) cb();
  }
}

function isAnimating(){ return anim.type !== null; }

let inventory=[], currentRoom="dining", score=0, petCount=0, itemsFound={};

function showMsg(t,cb){
  const ls=wrap(t,240);
  if(uiState==="message"&&msgBox){msgQueue.push({lines:ls,cb:cb||null});}
  else{msgBox={lines:ls,cb:cb||null};uiState="message";}
}
function dismissMsg(){
  // Fire cb on the box being dismissed
  if(msgBox&&msgBox.cb){msgBox.cb();msgBox.cb=null;}
  if(msgQueue.length){msgBox=msgQueue.shift();}
  else{msgBox=null;uiState="play";}
}

const VA={look:["look","look at","examine","inspect","check","study","read","observe","peer","gaze","stare","view","see","watch","scan","survey","search","describe","investigate"],smell:["smell","sniff","scent","whiff","nose","inhale"],touch:["touch","feel","paw","pat","tap","poke","prod","rub","stroke","knead","press","headbutt","bunt"],taste:["taste","lick","nibble","sample"],listen:["listen","hear","listen to","eavesdrop on"],eat:["eat","consume","devour","munch","chomp","gobble","chew","bite","dine","feast","snack","wolf down"],drink:["drink","lap","sip","slurp","gulp"],take:["take","get","grab","pick up","snag","steal","swipe","snatch","collect","acquire","pocket","nab","yoink"],drop:["drop","put down","set down","place","leave","discard","release","put"],open:["open","pull open","pry","pry open","crack open","pop open"],close:["close","shut","slam","push shut"],push:["push","shove","nudge","move","knock","bump","press"],pull:["pull","tug","yank","drag","haul"],climb:["climb","jump","jump on","jump up","leap","leap on","hop","hop on","hop up","pounce","mount","scale","clamber","jump onto","hop onto","get on","get up","get up on","spring onto","vault onto"],sit:["sit","sit on","sit down","rest","relax","lounge","lie","lie down","lie on","curl up","curl","lay","settle","sleep","sleep on","nap","nap on","perch","roost on"],scratch:["scratch","claw","sharpen","scrape","swat","bat","swipe at","rake"],turn:["turn","twist","rotate","switch","flip","toggle"],use:["use","operate","activate","try","work","employ","interact with"],enter:["enter","go through","walk through","go in","go into","pass through","walk into","step through"],talk:["talk","say","speak","tell","ask","chat","converse","call","yell","shout","whisper","meow at"]};
function matchVerb(w){for(const[v,as]of Object.entries(VA))if(as.includes(w))return v;return null;}
function matchNoun(t,r){
  const obs=RO[r]; const tl=t.toLowerCase();
  // Try nounMap first — sort matches by alias length descending to prefer longer (more specific) matches
  let best=null, bestLen=0;
  for(const[k,as] of Object.entries(nounMap)){
    if(!obs[k]) continue;
    for(const a of as) if(tl.includes(a)&&a.length>bestLen){best=k;bestLen=a.length;}
  }
  if(best) return best;
  // Fall back to RO key substring match
  for(const k of Object.keys(obs)) if(tl.includes(k)) return k;
  return null;
}

// ── JUMP-ONTO HELPER ─────────────────────────────────────
// Single source of truth for jumping onto any surface.
// Called by both bare "jump" (positional) and "climb/jump X" (noun-based).
// Returns true if handled (even if refused), false if noun is not a surface.
function jumpOnto(noun){
  const zones={
    table:  {room:"dining",  xMin:72,  xMax:224,layer:"table",  y:78},
    lchair: {room:"dining",  xMin:55,  xMax:80, layer:"lchair", y:92},
    rchair: {room:"dining",  xMin:237, xMax:262,layer:"rchair", y:92},
    counter:{room:"kitchen", xMin:60,  xMax:264,layer:"counter",y:70},
    bed:    {room:"bedroom", xMin:8,   xMax:86, layer:"bed",    y:64},
    dresser:{room:"bedroom", xMin:224, xMax:280,layer:"dresser",y:83},
  };
  // Stove: always hot, never lands
  if(noun==="stove"){
    if(currentRoom!=="kitchen"){showMsg("No stove here.");return true;}
    sfx.badcat();
    startAnim("jump",36,()=>{
      sfx.land();
      showMsg("You leap toward the stove and IMMEDIATELY regret it! HOT HOT HOT! You bail off before you even land. Your paws are fine. Your dignity is not.");
      addScore(3);
    }, true);
    return true;
  }
  const z=zones[noun];
  if(!z) return false; // not a recognised surface
  if(currentRoom!==z.room){
    const dn=(noun==="lchair"||noun==="rchair")?"chair":noun;
    showMsg("There is no "+dn+" to jump on here.");
    return true;
  }
  // Cross-surface: allow table↔chair hops without going to floor first
  if(P.layer!=="floor"){
    const crossOk={
      table: ["lchair","rchair"],
      lchair:["table"],
      rchair:["table"],
    };
    if(crossOk[P.layer]&&crossOk[P.layer].includes(noun)&&currentRoom===z.room){
      const crossMsgs={
        table:"You spring across to the table! Graceful, obviously.",
        lchair:"You hop across to the chair cushion. A lateral move, literally.",
        rchair:"You hop across to the chair cushion. A lateral move, literally.",
      };
      // Land at near edge of target: chairs land at their center; table lands at near edge toward the chair
      const crossX={
        lchair:67,   // center of lchair (xMin:55 xMax:80)
        rchair:249,  // center of rchair (xMin:237 xMax:262)
        table: P.layer==="lchair" ? 95 : 205,  // near edge of table toward whichever chair
      };
      sfx.jump();
      startAnim("jump",36,()=>{
        sfx.land(); P.layer=z.layer; P.y=z.y; P.x=crossX[noun]||P.x;
        addScore(2);
        showMsg(crossMsgs[noun]||"You hop across.");
      }, true);
      return true;
    }
    showMsg("You are already up on something.");
    return true;
  }
  if(P.x<z.xMin||P.x>z.xMax){
    const dispName=(noun==="lchair"||noun==="rchair")?"chair":noun;
    showMsg("You are not close enough to the "+dispName+" to jump on it. Move closer.");
    return true;
  }
  // State-aware messages
  const bedMsg=itemsFound.chaseTriggered
    ?"You FLING yourself onto the now-dog-free bed. EVERY INCH IS YOURS. You spread out completely. This is what the whole day was building to. Well. One of the things."
    :"You leap onto the bed! The dog shifts and sighs. You claim the good pillow.";
  const msgs={
    table:"You spring onto the table! The plates rattle. You survey your domain from on high.",
    lchair:"You hop up onto the chair cushion. Soft, warm, and covered in your own fur. Exactly as it should be.",
    rchair:"You hop up onto the chair cushion. The red velvet is warm from the lamp above. You settle in.",
    counter:"You leap onto the counter! King of the kitchen.",
    bed:bedMsg,
    dresser:"You scrabble up onto the dresser top! Dusty up here. A forgotten hairbrush. You knock it off the edge. Obviously.",
  };
  sfx.jump();
  startAnim("jump",36,()=>{
    sfx.land(); P.layer=z.layer; P.y=z.y;
    addScore(3);
    showMsg(msgs[noun]);
  }, true);
  return true;
}

// ── COMMAND PARSER ─────────────────────────────────────────
function parse(raw){
  const t=raw.trim().toLowerCase();if(!t)return;
  // Allow restart/help during infinite win-sleep; block everything else during animation
  const isWinSleep=anim.type==="sleep"&&anim.maxFrames===9999&&itemsFound.won;
  if(isAnimating()&&!isWinSleep)return;

  // Special commands
  if(t==="help"||t==="?"){showMsg("You are a cat. Arrow keys to move. Just type commands and press ENTER. TAB for inventory. Try: LOOK, SMELL, TOUCH, LISTEN, TASTE, EAT, DRINK, TAKE, DROP, OPEN, PUSH, PULL, CLIMB, SIT, SCRATCH, TURN. Cat verbs: MEOW, PURR, HISS, NAP, STRETCH, GROOM, JUMP, HIDE, WAIT, RUN.");return;}
  if(t==="inventory"||t==="i"){uiState="inventory";return;}
  if(t==="score"){showMsg("Your score is "+score+" points.");return;}
  if(t==="restart"||t==="new game"||t==="start over"){inventory=[];currentRoom="dining";score=0;petCount=0;itemsFound={};uiState="play";P.x=160;P.y=FLOOR-16;P.dir="right";P.layer="floor";anim={type:null,frame:0,maxFrames:0,onDone:null};trashBarrelBox.disabled=false;msgBox=null;msgQueue=[];uiState="play";P.layer="floor";P.x=160;P.y=FLOOR-16;startAnim("sleep",9999,null);
      sfx.fanfare();
      showMsg("You are a distinguished grey cat. Your kingdom spans three rooms. You awake from your slumber.",()=>{
        anim={type:null,frame:0,maxFrames:0,onDone:null,jumpUp:false};
        sfx.stretch();startAnim("stretch",60,null);
      });
      showMsg("Something reaches your nose. There is a silver serving lid on the dining table — and whatever is underneath it smells absolutely extraordinary.");
      showMsg("Arrow keys to move. Just start typing to enter commands. Good luck.");
      return;}
  if(uiState==="gameover"){showMsg("You are inside a trash barrel. Dignity: zero. Type RESTART to try again.");return;}
  if(t==="quit"||t==="q"){showMsg("You can't quit being a cat.");return;}
  if(t==="save"){showMsg("INSERT SAVE DISK IN DRIVE A: ... Just kidding. Your progress is stored in your whiskers.");return;}
  if(t==="load"||t==="restore"){showMsg("Nothing to restore. You live in the eternal present.");return;}
  if(t==="xyzzy"){showMsg("A hollow voice says: 'Mrow.'");sfx.pickup();return;}
  if(t==="debug"){debugMode=!debugMode;return;}
  if(t==="test"||t==="run tests"){runTests();return;}
  if(t==="version"||t==="about"){showMsg("Cat's Quest v1.0 — A pixel art text adventure. EGA graphics, 8-bit audio. 1987 forever.");return;}

  // ── ANIMATED CAT VERBS ──
  if(t==="meow"||t==="mew"||t==="mrow"||t==="yowl"){
    sfx.meow();
    const bedroomMeows=["You let out a soft mrow. Max's ear twitches. You freeze. His ear settles. Crisis averted.","You meow experimentally. Max shifts in his sleep and sighs deeply. Maybe don't.","MROW! Max's eyes flicker half-open. You look elaborately at the ceiling. He closes them again. That was close."];
    const normalMeows=["You let out a resounding MEOW. Majestic.","MROW! Nobody answers. But it felt right.","MEEEOOOOW. The universe takes note."];
    const msgs=currentRoom==="bedroom"?bedroomMeows:normalMeows;
    startAnim("meow",45,()=>{showMsg(msgs[Math.floor(Math.random()*msgs.length)]);});
    addScore(2);return;
  }
  if(t==="purr"){
    sfx.purr();
    startAnim("purr",80,()=>showMsg("PRRRRRRRRRR. The vibration resonates through your entire body. This is your power."));
    addScore(3);return;
  }
  if(t==="hiss"){
    sfx.hiss();
    startAnim("hiss",40,()=>showMsg("KSSSHHHH! You arch your back and hiss at nothing. The air is TERRIFIED."));
    addScore(1);return;
  }
  // JUMP UP / JUMP DOWN — layer transitions
  const jumpDown = t==="jump down"||t==="get down"||t==="climb down"||t==="hop down"||t==="leap down"||t==="jump off"||t==="jump floor"||t==="jump to floor";
  const jumpUp   = t==="jump"||t==="jump up"||t==="leap"||t==="hop"||t==="pounce"||t==="climb up"||t==="get up";
  if(jumpDown||jumpUp){
    // Jump down from table or counter → floor
    if(P.layer!=="floor"&&(jumpDown||jumpUp)){
      sfx.jump();
      startAnim("jump",36,()=>{
        sfx.land();P.layer="floor";P.y=FLOOR-16;
        // Trash-dive: did we land inside the upright barrel?
        if(currentRoom==="kitchen"&&!trashBarrelBox.disabled&&collides(P.x,P.y,"kitchen")){
          sfx.crash();
          itemsFound.trashDive=true;
          uiState="gameover";
          showMsg("You leap off the counter... directly into the open trash barrel.");
          showMsg("CLANG. CLATTER. A lid bounces across the kitchen floor.");
          showMsg("You are inside the barrel. You are surrounded by chicken scraps, old coffee grounds, and something that might have been a fish on Tuesday.");
          showMsg("You sit very still for a long time.");
          showMsg("A VERY DIRTY AND EMBARRASSED CAT.\n\nBut also, now that you think about it... surrounded by chicken scraps.\n\nSmall victories.\n\n☆ GAME OVER ☆\nFINAL SCORE: "+score+" points\n\nType RESTART to play again.");
        } else {
          showMsg("You leap down to the floor, landing with practiced grace.");
        }
      });
      return;
    }
    // Positional jump-up: detect nearest surface and delegate to jumpOnto
    if(P.layer==="floor"&&jumpUp){
      // Stove zone (kitchen, near stove)
      if(currentRoom==="kitchen"&&P.x>=265) { jumpOnto("stove"); return; }
      // Named surfaces by room
      const surfaces={dining:["lchair","table","rchair"],kitchen:["counter"],bedroom:["bed","dresser"]};
      const candidates=(surfaces[currentRoom]||[]);
      // Find first surface whose x range we are inside
      const zones={lchair:{xMin:55,xMax:80},table:{xMin:72,xMax:224},rchair:{xMin:237,xMax:262},counter:{xMin:60,xMax:264},bed:{xMin:8,xMax:86},dresser:{xMin:224,xMax:280}};
      const hit=candidates.find(n=>P.x>=zones[n].xMin&&P.x<=zones[n].xMax);
      if(hit){ jumpOnto(hit); return; }
      showMsg("You crouch to jump... but there's nothing up there worth landing on. You straighten up with dignity, as if that was always the plan.");
      return;
    }
    // jumpDown off floor (or generic jump in mid-air context) — graceful
    if(jumpDown||P.layer!=="floor"){
      sfx.jump();
      startAnim("jump",36,()=>{sfx.land();showMsg("You spring into the air with feline grace! And land perfectly.");});
      return;
    }
    showMsg("You crouch to jump... but there's nothing up there worth landing on. You straighten up with dignity, as if that was always the plan.");
    return;
  }
  if(t==="stretch"){
    sfx.stretch();
    startAnim("stretch",60,()=>showMsg("Full cat stretch: front paws forward, back arched, rear end high. Every vertebra cracks. Ahhhh."));

  }
  if(t==="scratch"){
    sfx.scratch();
    startAnim("scratch",50,()=>showMsg("You flex your claws and scratch vigorously at the "+(currentRoom==="dining"?"hardwood floor":currentRoom==="kitchen"?"tile floor":"carpet")+". Ahh, maintenance."));

  }
  if(t==="nap"||t==="sleep"){
    sfx.purr();
    if(P.layer==="lchair"||P.layer==="rchair"){
      startAnim("sleep",120,()=>showMsg("You circle three times and sink into the cushion. It is warm and slightly concave — the exact shape of you. You sleep for two hours. Someone tries to sit here. You do not move. They stand."));

    }
    if(P.layer==="dresser"){
      startAnim("drawerSleep",180,()=>showMsg("You wake up extremely refreshed. A sock is stuck to your face. You leave it there."));

    }
    startAnim("sleep",120,()=>showMsg("You curl into a perfect circle and drift off. You dream of birds and infinite tuna. You wake after 47 minutes. Refreshing!"));
    addScore(5);return;
  }
  if(t.startsWith("pet")||t==="groom"||t==="clean"||t==="wash"||t==="bathe"){
    sfx.purr();
    startAnim("groom",60,()=>{
      showMsg(["You groom meticulously. Left paw, right paw, behind the ears. IMMACULATE.","You lick your paw and wipe your face. Hygiene matters.","Thorough grooming. Every hair in place. Perfection.","You clean behind your ears. Looking good!"][petCount%4]);

  }
  if(t==="sing"||t==="yodel"){sfx.meow();startAnim("meow",40,()=>showMsg("You produce a sound charitably called singing."));return;}
  if(t==="dance"){startAnim("dance",50,()=>showMsg("You do a sideways crab-walk. Tail poofs. ADVANCED MOVEMENT."));return;}
  if(t==="think"||t==="ponder"||t==="contemplate"){showMsg("Why is the red dot uncatchable? Where does the food come from? Who is the cat in the mirror?");return;}

  // ── PLAY MOUSE (catnip mouse on rug — harmless fun) ───────
  if((t==="play mouse"||t==="play catnip"||t==="play with mouse"||t==="play with catnip")&&inventory.includes("catnip mouse")){
    if(currentRoom!=="bedroom"){showMsg("You bat the catnip mouse around. It skitters. You chase it. This is fine.");addScore(1);return;}
    sfx.scratch();

      showMsg("You go ABSOLUTELY FERAL on the catnip mouse. Batting, biting, bunny-kicking. You slide across the rug. You throw it in the air and catch it. You roll onto your back and kick it into the dresser. Max snores through all of it. He has seen this before.");
      addScore(3);
    });
    return;
  }

  // ── SQUEAK TOY / PLAY TOY — chase trigger ──────────────────
  if(t==="squeak toy"||t==="squeak"||t==="play toy"||t==="play with toy"||t==="use toy"||t==="play squeaky"||t==="use squeaky"||t==="squeaky"||t==="kong"||t==="squeeze kong"||t==="squeak kong"||t==="use kong"||t==="play kong"||t==="play with kong"){

const P={x:160,y:FLOOR-16,dir:"right",frame:0,at:0,moving:false,layer:"floor"};

function chgRoom(r){
  sfx.door();const from=currentRoom;currentRoom=r;P.layer="floor";
  if(r==="kitchen"){
    P.x=18;P.y=FLOOR-16;P.dir="right";
    if(!itemsFound.visitedKitchen){itemsFound.visitedKitchen=true;showMsg("You pad into the kitchen. Checkered tiles click under your paws.");}
  } else if(r==="bedroom"){
    P.x=GW-28;P.y=FLOOR-16;P.dir="left";
    if(!itemsFound.visitedBedroom){itemsFound.visitedBedroom=true;showMsg("You pad into the bedroom. It smells of warm blankets and... dog.");}
  } else { // dining
    if(from==="kitchen"){P.x=GW-28;P.dir="left";}else{P.x=28;P.dir="right";}
    P.y=FLOOR-16;
    itemsFound.visitedDining=true; // first visit tracked but no redundant message
  }
}

function updateP(){
  if(uiState==="gameover"||uiState!=="play"||isAnimating()||itemsFound.inCloset)return;
  let dx=0,dy=0;
  if(KD["ArrowLeft"])dx=-1;
  if(KD["ArrowRight"])dx=1;
  if(KD["ArrowUp"])dy=-1;
  if(KD["ArrowDown"])dy=1;
  P.moving=dx!==0||dy!==0;
  if(dx)P.dir=dx>0?"right":"left";
  const spd=1.2, yspd=spd*0.55;
  let nx=P.x+dx*spd, ny=P.y+dy*yspd;
  if(P.layer==="floor"){
    if(nx>=2&&nx<=GW-18&&!collides(nx,P.y,currentRoom)) P.x=nx;
    if(ny>=125&&ny<=FLOOR+30&&!collides(P.x,ny,currentRoom)) P.y=ny;
  } else if(P.layer==="table"){
    // Table surface x=86–234, cat is 14px wide → clamp to 86–220
    if(nx>=86&&nx<=220) P.x=nx;
  } else if(P.layer==="counter"){
    // Counter surface x=60–266, cat is 14px wide → clamp to 60–252
    if(nx>=60&&nx<=252) P.x=nx;
  } else if(P.layer==="bed"){
    // Bed surface x=14–80, cat is 14px wide → clamp to 14–66
    if(nx>=14&&nx<=66) P.x=nx;
  } else if(P.layer==="dresser"){
    // Dresser drawer opening x=232–276, cat 14px wide → clamp to 232–262
    if(nx>=232&&nx<=262) P.x=nx;
  } else if(P.layer==="lchair"){
    // Left chair seat x=55–80, cat 14px → clamp to 55–66
    if(nx>=55&&nx<=66) P.x=nx;
  } else if(P.layer==="rchair"){
    // Right chair seat x=237–262, cat 14px → clamp to 237–248
    if(nx>=237&&nx<=248) P.x=nx;
  }
  // Room transitions
  if(P.x>=GW-22&&currentRoom==="dining")chgRoom("kitchen");
  if(P.x>=GW-22&&currentRoom==="bedroom")chgRoom("dining");
  if(P.x<=6&&currentRoom==="dining")chgRoom("bedroom");
  if(P.x<=14&&currentRoom==="kitchen")chgRoom("dining");
  if(P.moving){P.at++;P.frame=Math.floor(P.at/5)%4;}else{P.frame=0;P.at=0;}
}

document.addEventListener("keydown",e=>{
  const k=e.key;KD[k]=true;ea();

  // Message box: Enter/ESC dismisses
  if(uiState==="message"){
    e.preventDefault();
    if(k.startsWith("Arrow")) return; // arrows move cat but don't dismiss
    dismissMsg();
    if(k.length===1&&!e.ctrlKey&&!e.metaKey) parserText+=k;
    return;
  }
  // Inventory: ESC/Tab/Enter closes
  if(uiState==="inventory"){
    if(k==="Escape"||k==="Tab"||k==="Enter"){e.preventDefault();uiState="play";}
    else e.preventDefault();
    return;
  }

  // Play state (only remaining state)
  // Tab opens inventory
  if(k==="Tab"){e.preventDefault();uiState="inventory";return;}
  // Prevent browser defaults on game keys
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Tab"," "].includes(k))e.preventDefault();

  // During animation, block typing — but allow during infinite win sleep
  if(isAnimating()&&!(anim.type==="sleep"&&anim.maxFrames===9999))return;

  // Enter: submit typed command
  if(k==="Enter"){
    e.preventDefault();
    if(parserText.trim()){const c=parserText;parserText="";parse(c);}
    return;
  }
  // Escape: clear text
  if(k==="Escape"){parserText="";return;}
  // Backspace
  if(k==="Backspace"){e.preventDefault();parserText=parserText.slice(0,-1);return;}
  // Typing: single printable chars (not arrow keys, not modifiers)
  if(k.length===1&&!e.ctrlKey&&!e.metaKey&&parserText.length<45){
    // Don't capture arrow-key movement letters while NOT typing
    // But once you start typing, all letters go to parser
    parserText+=k;
  }
});

function drawCat(){
  if(itemsFound.trashDive) return; // cat is inside barrel, rendered there instead
  if(itemsFound.inCloset) return;  // cat is inside the closet
  const x=Math.round(P.x),y=Math.round(P.y);
  const bc=E.lgray,dc=E.dgray;
  const d=P.dir;
  const a=anim.type;
  const af=anim.frame;

  // ── JUMP: vertical offset ──
  let yOff=0;
  if(a==="jump"){
    const t=af/anim.maxFrames;
    // jumpUp: quarter-sine (always rising, warp fires at peak)
    // jumpDown/generic: full sine arc (up then down)
    yOff = anim.jumpUp ? -Math.sin(t*Math.PI*0.5)*18 : -Math.sin(t*Math.PI)*14;
  }
  const dy=Math.round(yOff);

  // ── DRAWER SLEEP: cat curled in open dresser drawer ──
  if(a==="drawerSleep"){ drawDrawerSleepCat(x,y,af); return; }
  // ── ALERT: ears perked, pupils blown, pre-chase pose ──
  if(a==="alert"){ drawAlertCat(x,y,af); return; }
  // ── HISS: puffed up ──
  if(a==="hiss"){
    drawHissCat(x,y);return;
  }
  // ── SCRATCH: alternating paw strike ──
  if(a==="scratch"){
    drawScratchCat(x,y+dy,af);return;
  }
  // ── STRETCH ──
  if(a==="stretch"){
    drawStretchCat(x,y,af);return;
  }
  // ── SLEEP ──
  if(a==="sleep"){
    drawSleepCat(x,y);return;
  }
  // ── GROOM ──
  if(a==="groom"){
    drawGroomCat(x,y,af);return;
  }
  // ── EAT ──
  if(a==="eat"){
    drawEatCat(x,y,af);return;
  }
  // ── MEOW: open mouth ──
  if(a==="meow"){
    drawMeowCat(x,y+dy,af);return;
  }
  // ── DANCE: side shuffle ──
  if(a==="dance"){
    const sOff=Math.sin(af*0.4)*4;
    drawNormalCat(x+Math.round(sOff),y+dy,d,P.frame,P.moving);return;
  }
  // ── RUN: fast legs ──
  if(a==="run"){
    drawNormalCat(x,y+dy,d,Math.floor(af/2)%4,true);return;
  }
  // ── PURR: vibrate ──
  if(a==="purr"){
    const vib=(af%4<2)?1:0;
    drawNormalCat(x+vib,y+dy,d,0,false);
    // Purr lines
    X.fillStyle=E.white;
    const px=d==="right"?x+16:x-4;
    if(af%8<4){X.fillRect(px,y+4,2,1);X.fillRect(px+(d==="right"?2:-2),y+6,2,1);}
    return;
  }

  drawNormalCat(x,y+dy,d,P.frame,P.moving);
}

function drawNormalCat(x,y,d,f,moving){
  const bc=E.lgray,dc=E.dgray;
  const eo=d==="right"?0:2;

// ── MAIN LOOP ──────────────────────────────────────────────
function loop(){
  updateP();
  tickAnim();
  // Keep cat asleep once sleep starts after win
  if(itemsFound.won&&anim.type==="sleep"&&anim.maxFrames===9999&&anim.frame>=9998){
    startAnim("sleep",9999,null);
  }
  X.fillStyle=E.black;X.fillRect(0,0,GW,GH);
  drawTopBar();
  if(currentRoom==="dining")drawDining();else if(currentRoom==="kitchen")drawKitch();else drawBedroom();
  drawCat();
  if(currentRoom==="bedroom"&&P.layer==="dresser")drawDresserFg();
  if(debugMode)drawDebug();
  if(debugMode&&currentRoom==="bedroom")drawDoorDebug();
  if(uiState==="message")drawMBox();
  drawParser(); // always show if text present
  if(uiState==="inventory")drawInv();
  requestAnimationFrame(loop);
}

  reset(){uiState="play";parserText="";msgBox=null;msgQueue=[];inventory=[];currentRoom="dining";score=0;petCount=0;itemsFound={};P.x=160;P.y=FLOOR-16;P.dir="right";P.frame=0;P.moving=false;P.layer="floor";anim={type:null,frame:0,maxFrames:0,onDone:null};trashBarrelBox.disabled=false;}
};

// ── EMBEDDED TEST RUNNER ───────────────────────────────────
function runTests(){
  const G=window._test;
  // Play fanfare quietly, then stub sfx so test commands are silent
  ea(); masterGain.gain.value=0.15; sfx.fanfare();
  const _sfxSave={}; for(const k of Object.keys(sfx)){_sfxSave[k]=sfx[k]; sfx[k]=()=>{};}

  let _p=0,_f=0,_t=0,_secs=[];let _cur=null;
  function sec(n){_cur={name:n,tests:[]};_secs.push(_cur);}
  function ok(desc,cond){_t++;if(cond){_p++;}else{_f++;}_cur.tests.push({desc,ok:!!cond});}
  function eq(desc,a,e){_t++;const pass=a===e;if(pass){_p++;}else{_f++;}_cur.tests.push({desc:(pass?desc:`${desc} (expected ${JSON.stringify(e)}, got ${JSON.stringify(a)})`),ok:pass});}
  function inc(desc,a,s){_t++;const pass=typeof a==="string"&&a.includes(s);if(pass){_p++;}else{_f++;}_cur.tests.push({desc:(pass?desc:`${desc} (expected to include "${s}", got ${JSON.stringify(a)})`),ok:pass});}

  try {
  // ── VERB MATCHING ──────────────────────────────────────────
  sec("Verb Matching");
  eq("'examine' → look",G.matchVerb("examine"),"look");
  eq("'sniff' → smell",G.matchVerb("sniff"),"smell");
  eq("'claw' → scratch",G.matchVerb("claw"),"scratch");
  eq("'swipe at' → scratch",G.matchVerb("swipe at"),"scratch");
  eq("'jump' → climb",G.matchVerb("jump"),"climb");
  eq("'pounce' → climb",G.matchVerb("pounce"),"climb");
  eq("'devour' → eat",G.matchVerb("devour"),"eat");
  eq("'lap' → drink",G.matchVerb("lap"),"drink");
  eq("'grab' → take",G.matchVerb("grab"),"take");
  eq("'knead' → touch",G.matchVerb("knead"),"touch");
  eq("'sleep on' → sit",G.matchVerb("sleep on"),"sit");
  eq("'nap on' → sit",G.matchVerb("nap on"),"sit");
  eq("'yell' → talk",G.matchVerb("yell"),"talk");
  eq("unknown → null",G.matchVerb("flibbertigibbet"),null);

  // ── NOUN MATCHING ──────────────────────────────────────────
  sec("Noun Matching - Dining Room");

  eq("'oak' → table",G.matchNoun("oak","dining"),"table");

  eq("'kibble' → bowl",G.matchNoun("kibble","dining"),"bowl");
  eq("'fridge' → null in dining",G.matchNoun("fridge","dining"),null);

  sec("Noun Matching - Kitchen");
  eq("'refrigerator' → fridge",G.matchNoun("refrigerator","kitchen"),"fridge");
  eq("'oven' → stove",G.matchNoun("oven","kitchen"),"stove");
  eq("'faucet' → sink",G.matchNoun("faucet","kitchen"),"sink");
  eq("'cupboard' → cabinet",G.matchNoun("cupboard","kitchen"),"cabinet");
  eq("'saucepan' → pot",G.matchNoun("saucepan","kitchen"),"pot");
  eq("'table' → null in kitchen",G.matchNoun("table","kitchen"),null);

  sec("Noun Matching - Bedroom");
  eq("'bed' → bed",G.matchNoun("bed","bedroom"),"bed");
  eq("'mattress' → bed",G.matchNoun("mattress","bedroom"),"bed");
  eq("'blanket' → bed",G.matchNoun("blanket","bedroom"),"bed");
  eq("'dog' → dog",G.matchNoun("dog","bedroom"),"dog");
  eq("'retriever' → dog",G.matchNoun("retriever","bedroom"),"dog");
  eq("'dresser' → dresser",G.matchNoun("dresser","bedroom"),"dresser");
  eq("'bureau' → dresser",G.matchNoun("bureau","bedroom"),"dresser");
  eq("'mirror' → mirror",G.matchNoun("mirror","bedroom"),"mirror");
  eq("'rug' → rug",G.matchNoun("rug","bedroom"),"rug");
  eq("'carpet' → rug",G.matchNoun("carpet","bedroom"),"rug");
  eq("'catnip' → catnip",G.matchNoun("catnip","bedroom"),"catnip");
  eq("'closet' → closet",G.matchNoun("closet","bedroom"),"closet");
  eq("'wardrobe' → closet",G.matchNoun("wardrobe","bedroom"),"closet");

  // ── COLLISION ─────────────────────────────────────────────
  sec("Collision System");
  ok("Dining: all floor walkable",!G.collides(160,124,"dining"));
  ok("Dining: left side walkable",!G.collides(40,124,"dining"));
  ok("Dining: right side walkable",!G.collides(260,124,"dining"));
  ok("Kitchen: center walkable",!G.collides(140,124,"kitchen"));
  ok("Kitchen: left side walkable",!G.collides(60,124,"kitchen"));
  ok("Bedroom: center walkable",!G.collides(160,124,"bedroom"));

  // ── TEXT WRAPPING ─────────────────────────────────────────
  sec("Text Wrapping");
  const w1=G.wrap("Hello world",200);
  eq("Short text = 1 line",w1.length,1);
  eq("Short text content",w1[0],"Hello world");
  const w2=G.wrap("This is a much longer sentence that should wrap across multiple lines when the width is small",100);
  ok("Long text wraps",w2.length>1);
  ok("Each line fits width",w2.every(l=>l.length*6<=106));

  // ── ROOM DESCRIPTIONS ────────────────────────────────────
  sec("Room Descriptions");
  G.reset();G.dismissMsg();G.parse("look");
  ok("look gives message",G.state.msgBox!==null);
  inc("look in dining mentions table",G.state.msgBox.lines.join(" "),"table");
  G.reset();G.dismissMsg();G.parse("go kitchen");G.dismissMsg();G.parse("look");
  inc("look in kitchen mentions fridge",G.state.msgBox.lines.join(" "),"fridge");
  G.reset();G.dismissMsg();G.parse("go bedroom");G.dismissMsg();G.parse("look");
  inc("look in bedroom mentions bed",G.state.msgBox.lines.join(" "),"bed");
  inc("look in bedroom mentions dog",G.state.msgBox.lines.join(" "),"retriever");

  // ── NAVIGATION ───────────────────────────────────────────
  sec("Navigation");

  G.parse("go kitchen");eq("go kitchen → kitchen",G.state.currentRoom,"kitchen");G.dismissMsg();
  G.parse("go dining room");eq("go dining → dining",G.state.currentRoom,"dining");G.dismissMsg();
  G.parse("go bedroom");eq("go bedroom → bedroom",G.state.currentRoom,"bedroom");G.dismissMsg();
  G.parse("go east");eq("go east from bedroom → dining",G.state.currentRoom,"dining");G.dismissMsg();
  G.parse("go east");eq("go east from dining → kitchen",G.state.currentRoom,"kitchen");G.dismissMsg();
  G.parse("go west");eq("go west from kitchen → dining",G.state.currentRoom,"dining");G.dismissMsg();
  G.parse("go west");eq("go west from dining → bedroom",G.state.currentRoom,"bedroom");G.dismissMsg();
  G.parse("go outside");ok("go outside gives message",G.state.msgBox!==null);

  // ── SCORE ─────────────────────────────────────────────────
  sec("Score System");
  G.reset();G.dismissMsg();const s0=G.state.score;
  G.parse("meow");ok("meow increases score",G.state.score>s0);

  // ── CAT ANIMATIONS ───────────────────────────────────────
  sec("Cat Verb Animations");
  G.reset();G.dismissMsg();G.parse("meow");eq("meow anim",G.state.anim.type,"meow");
  G.reset();G.dismissMsg();G.parse("hiss");eq("hiss anim",G.state.anim.type,"hiss");
  G.reset();G.dismissMsg();G.parse("purr");eq("purr anim",G.state.anim.type,"purr");
  G.reset();G.dismissMsg();G.parse("stretch");eq("stretch anim",G.state.anim.type,"stretch");
  G.reset();G.dismissMsg();G.parse("nap");eq("nap → sleep anim",G.state.anim.type,"sleep");
  G.reset();G.dismissMsg();G.parse("sleep");eq("sleep → sleep anim",G.state.anim.type,"sleep");
  G.reset();G.dismissMsg();G.parse("groom");eq("groom anim",G.state.anim.type,"groom");
  G.reset();G.dismissMsg();G.parse("scratch");eq("bare scratch anim",G.state.anim.type,"scratch");

  // ── OBJECT INTERACTIONS ───────────────────────────────────
  sec("Dining Object Interactions");
  G.reset();G.dismissMsg();
  G.parse("smell table");ok("smell table gives message",G.state.msgBox!==null);
  inc("smell table mentions chicken",G.state.msgBox.lines.join(" "),"chicken");
  G.reset();G.dismissMsg();
  G.parse("examine painting");ok("examine painting works",G.state.msgBox!==null);
  inc("examine painting mentions Whiskers",G.state.msgBox.lines.join(" "),"Whiskers");
  G.reset();G.dismissMsg();
  G.parse("claw curtain");ok("claw curtain → scratch anim",G.state.anim.type==="scratch");

  sec("Bedroom Object Interactions");
  G.reset();G.dismissMsg();G.parse("go bedroom");G.dismissMsg();

  G.dismissMsg();
  G.parse("smell dresser");ok("smell dresser gives message",G.state.msgBox!==null);
  inc("smell dresser mentions cedar",G.state.msgBox.lines.join(" "),"Cedar");
  G.dismissMsg();
  G.parse("look mirror");inc("mirror mentions handsome",G.state.msgBox.lines.join(" "),"handsome");
  G.dismissMsg();
  G.parse("knead rug");ok("knead rug gives message",G.state.msgBox!==null);
  G.dismissMsg();
  G.parse("sleep on rug");
  if(G.state.anim.onDone){G.state.anim.onDone();}G.state.anim.type=null;
  ok("sleep on rug gives message",G.state.msgBox!==null);
  inc("sleep on rug mentions circle",G.state.msgBox.lines.join(" "),"circle");

  // ── PLOT OBJECTS ─────────────────────────────────────────
  sec("Plot Nouns");
  eq("lid in dining",         G.matchNoun("lid","dining"),        "lid");
  eq("cover→lid",             G.matchNoun("cover","dining"),      "lid");
  eq("tablecloth in dining",  G.matchNoun("tablecloth","dining"), "tablecloth");
  eq("cloth→tablecloth",      G.matchNoun("cloth","dining"),      "tablecloth");
  eq("chicken in dining",     G.matchNoun("chicken","dining"),    "chicken");
  eq("carcass→chicken",       G.matchNoun("carcass","dining"),    "chicken");
  eq("squeaky→dogtoy",        G.matchNoun("squeaky toy","kitchen"),"dogtoy");
  eq("barrel→trash",          G.matchNoun("barrel","kitchen"),    "trash");

  sec("Collision - Trash Barrel");
  G.reset();G.dismissMsg();

  sec("Plot - Take Dog Toy");
  G.reset();G.dismissMsg();
  G.parse("take toy");
  inc("no toy here (wrong room)",G.state.msgBox.lines.join(" "),"squeaky");
  G.dismissMsg();
  G.parse("go kitchen");G.dismissMsg();
  G.parse("take toy");G.dismissMsg();

  sec("Plot - Squeak in Wrong Room");

  G.parse("go kitchen");G.dismissMsg();
  G.parse("take toy");G.dismissMsg();

  ok("squeak msg in kitchen",G.state.msgBox!==null);
  ok("chase NOT triggered",!G.state.itemsFound.chaseTriggered);
  G.dismissMsg();

  sec("Plot - Chase Sequence");
  G.reset();G.dismissMsg();
  G.parse("go kitchen");G.dismissMsg();
  G.parse("take toy");G.dismissMsg();
  G.parse("go dining room");G.dismissMsg();
  G.parse("go bedroom");G.dismissMsg();
  G.parse("squeak toy");
  // Alert anim starts — tick it through to fire callback
  for(let i=0;i<28;i++)G.tickAnim();
  // Callback fired: bedroom msgs queued, cat frozen in 9999-alert; NOT warped yet
  eq("still in bedroom after squeak",G.state.currentRoom,"bedroom");
  ok("alert anim frozen",G.state.anim.type==="alert");
  ok("chase NOT triggered yet",!G.state.itemsFound.chaseTriggered);
  G.dismissMsg(); // msg 1: "SQUEAK"

  G.dismissMsg(); // msg 3: "He sees the toy..." → callback fires → warp
  ok("chase triggered after 3rd msg",G.state.itemsFound.chaseTriggered===true);
  ok("cloth fallen",G.state.itemsFound.clothFallen===true);
  eq("warped to dining",G.state.currentRoom,"dining");
  ok("barrel disabled",trashBarrelBox.disabled===true);
  G.dismissMsg();G.dismissMsg();G.dismissMsg(); // remaining msgs

  sec("Closet - Enter and Exit");

  G.parse("enter closet");
  ok("inCloset set on enter",G.state.itemsFound.inCloset===true);
  inc("enter closet dark msg",G.state.msgBox.lines.join(" "),"dark");
  G.dismissMsg();G.dismissMsg();
  G.parse("look");
  inc("look in closet mentions litter",G.state.msgBox.lines.join(" "),"litter");
  G.dismissMsg();G.dismissMsg();

  sec("Plot - Win State");

  G.parse("take toy");G.dismissMsg();
  G.parse("go dining room");G.dismissMsg();
  G.parse("go bedroom");G.dismissMsg();

  G.dismissMsg();G.dismissMsg();G.dismissMsg(); // msgs 1-3; msg 3 cb warps to dining
  G.dismissMsg();G.dismissMsg();G.dismissMsg(); // msgs 4-6
  G.state.P.layer="table";G.state.P.y=78; // must be on table to eat chicken
  G.parse("eat chicken");
  for(let i=0;i<120;i++)G.tickAnim(); // let eat anim complete → fires onDone → msg 1 queued
  ok("win msg shown",G.state.msgBox!==null);

  G.parse("jump");
  if(G.state.anim.onDone){G.state.anim.onDone();}
  G.state.anim.type=null;G.dismissMsg();
  eq("jump in bedroom → bed layer",G.state.P.layer,"bed");
  eq("jump in bedroom → y=64",G.state.P.y,64);

  // ── INVENTORY ────────────────────────────────────────────
  sec("Inventory System");
  G.reset();G.dismissMsg();
  G.parse("take tuna");inc("can't take tuna without fridge",G.state.msgBox.lines.join(" "),"fridge");

  G.parse("take tuna");inc("can't take tuna twice",G.state.msgBox.lines.join(" "),"already");
  G.dismissMsg();G.parse("eat tuna");
  eq("eating tuna removes from inventory",G.state.inventory.length,0);

  sec("Kitchen Treats");
  G.reset();G.dismissMsg();G.parse("go kitchen");G.dismissMsg();
  G.parse("open cabinet");G.dismissMsg();
  ok("cabinet marked opened",G.state.itemsFound.cabinetOpened===true);
  G.parse("take treats");G.dismissMsg();
  eq("treats in inventory",G.state.inventory.length,1);
  inc("treats item name",G.state.inventory[0],"treat");

  // ── SPECIAL COMMANDS ─────────────────────────────────────
  sec("Special Commands");
  G.reset();G.dismissMsg();
  G.parse("save");inc("save easter egg",G.state.msgBox.lines.join(" "),"DISK");
  G.dismissMsg();G.parse("xyzzy");inc("xyzzy easter egg",G.state.msgBox.lines.join(" "),"Mrow");
  G.dismissMsg();G.parse("score");inc("score shows score",G.state.msgBox.lines.join(" "),"score");
  G.dismissMsg();G.parse("help");ok("help gives message",G.state.msgBox!==null);

  // ── ROOM-WIDE SENSES ─────────────────────────────────────
  sec("Room-wide Senses");
  G.reset();G.dismissMsg();
  G.parse("smell");inc("bare smell in dining",G.state.msgBox.lines.join(" "),"polish");
  G.dismissMsg();G.parse("listen");inc("bare listen in dining",G.state.msgBox.lines.join(" "),"Chandelier");
  G.reset();G.dismissMsg();G.parse("go kitchen");G.dismissMsg();
  G.parse("smell");inc("bare smell in kitchen",G.state.msgBox.lines.join(" "),"cleaner");
  G.reset();G.dismissMsg();G.parse("go bedroom");G.dismissMsg();
  G.parse("smell");inc("bare smell in bedroom",G.state.msgBox.lines.join(" "),"dog");
  G.dismissMsg();G.parse("listen");inc("bare listen in bedroom",G.state.msgBox.lines.join(" "),"snore");

  // ── ERROR HANDLING ───────────────────────────────────────
  sec("Error Handling");
  G.reset();G.dismissMsg();
  G.parse("florbinate the gizzard");ok("nonsense gives message",G.state.msgBox!==null);
  G.dismissMsg();G.parse("");ok("empty parse is safe",true);

  sec("State Management");
  G.reset();
  eq("reset: dining",G.state.currentRoom,"dining");
  eq("reset: score 0",G.state.score,0);
  eq("reset: empty inv",G.state.inventory.length,0);

  sec("New Aliases");
  eq("kong→dogtoy", G.matchNoun("kong","kitchen"), "dogtoy");
  eq("rubber kong→dogtoy", G.matchNoun("rubber kong","kitchen"), "dogtoy");

  eq("headbutt→touch", G.matchVerb("headbutt"), "touch");

  eq("meow at→talk", G.matchVerb("meow at"), "talk");
  eq("inhale→smell", G.matchVerb("inhale"), "smell");

  sec("Cat Verbs - New");

  G.reset();G.dismissMsg();

  G.reset();G.dismissMsg();
  G.state.P.layer="table";
  G.parse("knock");ok("knock on table: scratch anim", G.state.anim.type==="scratch");
  G.reset();G.dismissMsg();

  G.reset();G.dismissMsg();

  G.reset();G.dismissMsg();
  G.showMsg("First message");G.showMsg("Second message");
  ok("first message shown",G.state.msgBox!==null);
  inc("first msg content",G.state.msgBox.lines.join(" "),"First");
  G.dismissMsg();ok("second from queue",G.state.msgBox!==null);
  inc("second msg content",G.state.msgBox.lines.join(" "),"Second");
  G.dismissMsg();eq("queue empty: null",G.state.msgBox,null);

  // ── REGRESSION: TABLE LOOK/SMELL CHANGES ────────────────
  sec("State - Table Look/Smell");
  G.reset();G.dismissMsg();
  G.parse("look table");
  inc("pre-chase table mentions lid",G.state.msgBox.lines.join(" "),"serving lid");
  G.dismissMsg();G.parse("smell table");
  inc("pre-chase smell mentions last night",G.state.msgBox.lines.join(" "),"last night");
  G.dismissMsg();
  // Trigger chase
  G.setState({currentRoom:"kitchen"});G.parse("take toy");G.dismissMsg();
  G.setState({currentRoom:"bedroom"});G.parse("squeaky");
  for(let i=0;i<28;i++)G.tickAnim(); // fire alert callback
  G.dismissMsg();G.dismissMsg();G.dismissMsg(); // msgs 1-3 (msg 3 cb warps to dining)
  G.dismissMsg();G.dismissMsg();G.dismissMsg(); // msgs 4-6
  G.setState({currentRoom:"dining"});
  G.parse("look table");
  inc("post-chase table mentions chicken",G.state.msgBox.lines.join(" "),"chicken");
  const noLidPost=!G.state.msgBox.lines.join(" ").includes("serving lid");
  ok("post-chase table no longer mentions lid",noLidPost);
  G.dismissMsg();G.parse("smell table");
  inc("post-chase smell says fresh chicken",G.state.msgBox.lines.join(" "),"FRESH");

  // ── REGRESSION: ROOM DESC CHANGES ───────────────────────
  sec("State - Room Desc Post-Chase");
  G.reset();G.dismissMsg();
  G.setState({currentRoom:"kitchen"});G.state.itemsFound.chaseTriggered=true;
  G.parse("look");
  inc("kitchen post-chase desc mentions disaster",G.state.msgBox.lines.join(" "),"disaster");
  G.dismissMsg();
  G.setState({currentRoom:"dining"});G.state.itemsFound.clothFallen=true;
  G.parse("look");
  inc("dining post-chase desc mentions chicken",G.state.msgBox.lines.join(" "),"chicken");
  G.dismissMsg();

  // ── REGRESSION: TRASH TEXT CHANGES ──────────────────────
  sec("State - Trash Post-Chase");
  G.reset();G.dismissMsg();
  G.setState({currentRoom:"kitchen"});
  G.parse("look trash");
  inc("pre-chase trash mentions barrel",G.state.msgBox.lines.join(" "),"barrel");
  G.dismissMsg();
  G.state.itemsFound.chaseTriggered=true;
  G.parse("look trash");
  inc("post-chase trash mentions knocked over",G.state.msgBox.lines.join(" "),"knocked");
  G.dismissMsg();G.parse("smell trash");
  inc("post-chase trash smell changed",G.state.msgBox.lines.join(" "),"floor");

  // ── REGRESSION: BASKET ALWAYS VISIBLE ───────────────────
  sec("State - Basket Persists After Chase");
  G.reset();G.dismissMsg();
  G.setState({currentRoom:"kitchen"});
  G.parse("look basket");
  inc("basket visible before chase",G.state.msgBox.lines.join(" "),"basket");
  G.dismissMsg();
  G.state.itemsFound.chaseTriggered=true;G.state.itemsFound.toyTaken=true;
  G.parse("look basket");
  inc("basket visible after chase (just empty)",G.state.msgBox.lines.join(" "),"basket");
  G.dismissMsg();G.parse("look dogtoy");
  inc("dogtoy gone message mentions empty",G.state.msgBox.lines.join(" "),"empty");

  // ── REGRESSION: CLIMB TABLE/COUNTER SETS LAYER ──────────
  sec("State - Climb Sets Layer");
  G.reset();G.dismissMsg();
  eq("starts on floor","floor",G.state.P.layer);
  G.state.P.x=150;
  G.parse("climb table");
  // Advance animation
  for(let i=0;i<60;i++) G.tickAnim();
  eq("after climb table, layer=table","table",G.state.P.layer);
  G.parse("jump down");
  for(let i=0;i<60;i++) G.tickAnim();
  eq("after jump down, layer=floor","floor",G.state.P.layer);
  G.setState({currentRoom:"kitchen"});G.state.P.x=150;
  G.parse("climb counter");
  for(let i=0;i<60;i++) G.tickAnim();
  eq("after climb counter, layer=counter","counter",G.state.P.layer);

  // ── REGRESSION: WIN STATE ────────────────────────────────
  sec("State - Win");
  G.reset();G.dismissMsg();
  G.setState({currentRoom:"dining"});G.state.itemsFound.clothFallen=true;
  G.state.P.layer="table";G.state.P.y=78;
  G.parse("eat chicken");
  for(let i=0;i<120;i++) G.tickAnim();
  G.dismissMsg(); // "You attack the chicken..."
  G.dismissMsg(); // "You topple sideways..."
  G.dismissMsg(); // "The humans come home..."
  ok("win message shown",G.state.msgBox!==null);
  inc("win message mentions YOU WIN",G.state.msgBox.lines.join(" "),"WIN");
  inc("win message shows score",G.state.msgBox.lines.join(" "),"SCORE");

  // ── Trash Dive Game Over ───────────────────────────────
  sec("Trash Dive");
  G.reset();G.dismissMsg();
  G.setState({currentRoom:"kitchen"});
  G.state.P.layer="counter";G.state.P.y=70;
  G.state.P.x=220; // within barrel x range (215-243)
  G.parse("jump down");for(let i=0;i<60;i++)G.tickAnim();
  ok("trash dive: trashDive flag set",!!G.state.itemsFound.trashDive);
  ok("trash dive: gameover indicated",!!G.state.itemsFound.trashDive&&G.state.uiState!=="play");
  G.dismissMsg(); // "You leap off..."
  G.dismissMsg(); // "CLANG. CLATTER..."
  G.dismissMsg(); // "You are inside the barrel..."
  G.dismissMsg(); // "You sit very still..."
  ok("trash dive: final msg present",G.state.msgBox!==null);
  inc("trash dive: final msg mentions GAME OVER",G.state.msgBox?G.state.msgBox.lines.join(" "):"","GAME OVER");
  // Commands blocked in gameover (except restart)
  G.dismissMsg();
  G.parse("look");
  ok("gameover blocks look with barrel msg",G.state.msgBox!==null);
  // Clean landing (away from barrel) does NOT trigger gameover
  G.reset();G.dismissMsg();
  G.setState({currentRoom:"kitchen"});
  G.state.P.layer="counter";G.state.P.y=70;
  G.state.P.x=120; // away from barrel
  G.parse("jump down");for(let i=0;i<60;i++)G.tickAnim();
  ok("clean landing: no trashDive",!G.state.itemsFound.trashDive);
  ok("clean landing: still play state",G.state.uiState!=="gameover");

  // ── Table Floor Walkability (regression) ─────────────────
  sec("Table Floor Walkability");
  G.reset();G.dismissMsg();G.setState({currentRoom:"dining"});
  ok("under table center walkable",!G.collides(150,130,"dining"));
  ok("left of table walkable",!G.collides(30,130,"dining"));
  ok("right of table walkable",!G.collides(260,130,"dining"));
  G.state.P.x=150;G.parse("jump");for(let i=0;i<60;i++)G.tickAnim();G.dismissMsg();
  eq("table still jumpable","table",G.state.P.layer);

  // ── JumpUp With No Surface ────────────────────────────────
  sec("JumpUp No Surface");
  G.reset();G.dismissMsg();G.setState({currentRoom:"dining"});
  G.state.P.x=10;
  G.parse("jump up");
  inc("jump up off-surface: message has nothing",G.state.msgBox.lines.join(" "),"nothing");
  eq("jump up off-surface: stays floor","floor",G.state.P.layer);

  // ── TrashDive: drawCat + gameover ─────────────────────────
  // ── Unified Jump System ───────────────────────────────────
  sec("Unified Jump System");

  // jump (positional) under table
  G.reset();G.dismissMsg();G.setState({currentRoom:"dining"});G.state.P.x=150;
  G.parse("jump");for(let i=0;i<60;i++)G.tickAnim();G.dismissMsg();
  eq("positional jump onto table: layer","table",G.state.P.layer);

  // jump table (noun-based) when in range
  G.reset();G.dismissMsg();G.setState({currentRoom:"dining"});G.state.P.x=150;
  G.parse("jump table");for(let i=0;i<60;i++)G.tickAnim();G.dismissMsg();
  eq("jump table in range: layer","table",G.state.P.layer);

  // jump table (noun-based) when OUT of range
  G.reset();G.dismissMsg();G.setState({currentRoom:"dining"});G.state.P.x=10;
  G.parse("jump table");
  inc("jump table out of range: not close enough",G.state.msgBox.lines.join(" "),"close");
  eq("jump table out of range: still floor","floor",G.state.P.layer);

  // jump bed — dog present
  G.reset();G.dismissMsg();G.setState({currentRoom:"bedroom"});G.state.P.x=40;
  G.parse("jump");for(let i=0;i<60;i++)G.tickAnim();
  inc("jump bed dog present: dog message",G.state.msgBox.lines.join(" "),"dog");
  eq("jump bed dog present: layer","bed",G.state.P.layer);

  // jump bed — dog gone (chaseTriggered)
  G.reset();G.dismissMsg();G.setState({currentRoom:"bedroom"});
  G.state.itemsFound.chaseTriggered=true;G.state.P.x=40;
  G.parse("jump");for(let i=0;i<60;i++)G.tickAnim();
  inc("jump bed dog gone: YOURS message",G.state.msgBox.lines.join(" "),"YOURS");
  eq("jump bed dog gone: layer","bed",G.state.P.layer);

  // jump bed (noun) — dog gone message matches
  G.reset();G.dismissMsg();G.setState({currentRoom:"bedroom"});
  G.state.itemsFound.chaseTriggered=true;G.state.P.x=40;
  G.parse("jump bed");for(let i=0;i<60;i++)G.tickAnim();
  inc("jump bed noun dog gone: same YOURS message",G.state.msgBox.lines.join(" "),"YOURS");

  // jump dresser (positional)
  G.reset();G.dismissMsg();G.setState({currentRoom:"bedroom"});G.state.P.x=250;
  G.parse("jump");for(let i=0;i<60;i++)G.tickAnim();G.dismissMsg();
  eq("positional jump onto dresser: layer","dresser",G.state.P.layer);

  // jump dresser (noun-based)
  G.reset();G.dismissMsg();G.setState({currentRoom:"bedroom"});G.state.P.x=250;
  G.parse("jump dresser");for(let i=0;i<60;i++)G.tickAnim();G.dismissMsg();
  eq("jump dresser noun: layer","dresser",G.state.P.layer);

  // jump stove — both paths same result
  G.reset();G.dismissMsg();G.setState({currentRoom:"kitchen"});G.state.P.x=280;
  G.parse("jump");for(let i=0;i<60;i++)G.tickAnim();
  inc("positional jump near stove: HOT",G.state.msgBox.lines.join(" "),"HOT");
  eq("positional jump near stove: still floor","floor",G.state.P.layer);
  G.reset();G.dismissMsg();G.setState({currentRoom:"kitchen"});G.state.P.x=280;
  G.parse("jump stove");for(let i=0;i<60;i++)G.tickAnim();
  inc("jump stove noun: HOT",G.state.msgBox.lines.join(" "),"HOT");
  eq("jump stove noun: still floor","floor",G.state.P.layer);

  // ── Sink Requires Counter ─────────────────────────────────
  sec("Sink Requires Counter");
  G.reset();G.dismissMsg();G.setState({currentRoom:"kitchen"});
  G.parse("drink sink");
  inc("drink sink on floor: blocked",G.state.msgBox.lines.join(" "),"counter");
  G.dismissMsg();
  G.state.P.layer="counter";
  G.parse("drink sink");
  inc("drink sink on counter: allowed",G.state.msgBox.lines.join(" "),"faucet");

  // ── Eat Chicken Requires Table ────────────────────────────
  sec("Eat Chicken Requires Table");
  G.reset();G.dismissMsg();G.setState({currentRoom:"dining"});
  G.state.itemsFound.clothFallen=true;
  G.parse("eat chicken");
  inc("eat chicken on floor: need table",G.state.msgBox.lines.join(" "),"table");
  ok("eat chicken on floor: no win",!G.state.itemsFound.won);
  G.dismissMsg();
  G.state.P.layer="table";G.state.P.y=78;
  G.parse("eat chicken");for(let i=0;i<120;i++)G.tickAnim();
  ok("eat chicken on table: win triggered",G.state.msgBox!==null);

  sec("Get Chicken Room Guard");
  G.reset();G.dismissMsg();G.setState({currentRoom:"kitchen"});
  G.state.itemsFound.clothFallen=true;
  G.parse("get chicken");
  eq("get chicken in kitchen: not dining, no win",G.state.uiState,"message"); // shows "can't take" msg
  ok("get chicken in kitchen: not won",!G.state.itemsFound.won);

  sec("Bones - Kitchen Post-Chase");
  G.reset();G.dismissMsg();G.setState({currentRoom:"kitchen"});
  G.state.itemsFound.chaseTriggered=true;
  G.parse("look bones");
  ok("look bones: has msg",G.state.msgBox!==null);
  inc("look bones: mentions bones",G.state.msgBox.lines.join(" "),"bones");
  G.dismissMsg();
  G.parse("smell bones");
  inc("smell bones: mentions chicken",G.state.msgBox.lines.join(" "),"chicken");
  G.dismissMsg();
  G.parse("lick bones");
  inc("lick bones: mentions meaty or splinter",G.state.msgBox.lines.join(" "),"meaty");
  G.dismissMsg();
  G.parse("taste bones");
  inc("taste bones: same response",G.state.msgBox.lines.join(" "),"meaty");
  G.dismissMsg();
  G.parse("eat bones");for(let i=0;i<50;i++)G.tickAnim();
  inc("eat bones: warns about danger",G.state.msgBox?G.state.msgBox.lines.join(" "):"","splinter");
  G.dismissMsg();

  sec("Jump Down Aliases");
  G.reset();G.dismissMsg();G.setState({currentRoom:"dining"});
  G.state.P.layer="table";G.state.P.y=78;
  G.parse("jump off");for(let i=0;i<60;i++)G.tickAnim();
  eq("jump off: back on floor","floor",G.state.P.layer);
  G.state.P.layer="table";G.state.P.y=78;
  G.parse("jump floor");for(let i=0;i<60;i++)G.tickAnim();
  eq("jump floor: back on floor","floor",G.state.P.layer);

  sec("Closet Exit Warp");
  G.reset();G.dismissMsg();G.setState({currentRoom:"bedroom"});
  G.state.itemsFound.inCloset=true;
  G.state.P.x=50; // somewhere far left
  G.parse("exit closet");G.dismissMsg();
  ok("exit closet: x is right of door",G.state.P.x>=160);
  eq("exit closet: not in closet",false,!!G.state.itemsFound.inCloset);

  sec("Kong Squeak Alias");
  G.reset();G.dismissMsg();G.setState({currentRoom:"bedroom"});
  G.state.inventory.push("dog toy");
  G.parse("kong");for(let i=0;i<28;i++)G.tickAnim();
  ok("kong triggers alert anim or msg",G.state.anim.type==="alert"||G.state.msgBox!==null);

  sec("Smell Chicken Gate");
  G.reset();G.dismissMsg();G.setState({currentRoom:"dining"});
  G.parse("smell chicken");
  inc("smell chicken before cloth: mentions lid or smell",G.state.msgBox.lines.join(" "),"lid");
  G.dismissMsg();
  G.state.itemsFound.clothFallen=true;
  G.parse("smell chicken");
  inc("smell chicken after cloth: mentions chicken",G.state.msgBox.lines.join(" "),"chicken");
  G.dismissMsg();

  sec("Bones Pre-Chase Guard");
  G.reset();G.dismissMsg();G.setState({currentRoom:"kitchen"});
  G.parse("look bones");
  inc("look bones pre-chase: blocked",G.state.msgBox.lines.join(" "),"barrel");
  G.dismissMsg();
  G.state.itemsFound.chaseTriggered=true;
  G.parse("look bones");
  inc("look bones post-chase: shows bones",G.state.msgBox.lines.join(" "),"bones");
  G.dismissMsg();

  sec("Lid Verbs");
  G.reset();G.dismissMsg();G.setState({currentRoom:"dining"});
  G.parse("move lid");
  ok("move lid: has response",G.state.msgBox!==null);
  G.dismissMsg();
  G.parse("take lid");
  ok("take lid: has response",G.state.msgBox!==null);
  G.dismissMsg();
  G.parse("pull lid");
  ok("pull lid: has response",G.state.msgBox!==null);
  G.dismissMsg();

  } catch(e) {
    if(_cur) _cur.tests.push({desc:"EXCEPTION: "+e.message,ok:false});
    _f++;_t++;
  } finally {
    G.reset();
    for(const k of Object.keys(_sfxSave)) sfx[k]=_sfxSave[k];
    if(masterGain) masterGain.gain.value=1.0;
  }

  // Render overlay
  let html=`<style>#tov *{font-family:monospace;box-sizing:border-box} .tpass{color:#55FF55} .tfail{color:#FF5555;font-weight:bold} .tsec{color:#FFFF55;margin:12px 0 4px;font-size:13px} .ttest{font-size:11px;margin:1px 0} .tsum{margin-top:16px;padding:8px 12px;border:1px solid #555;font-size:13px;display:inline-block}</style>`;
  for(const s of _secs){
    html+=`<div class="tsec">${s.name}</div>`;
    for(const t of s.tests) html+=`<div class="ttest ${t.ok?'tpass':'tfail'}">${t.ok?'✓':'✗'} ${t.desc}</div>`;
  }
  const sc=_f?'tfail':'tpass';
  html+=`<div class="tsum ${sc}">${_p}/${_t} passed &nbsp; ${_f} failed</div>`;
  html+=`<div style="margin-top:16px;color:#FFFF55;font-family:monospace;font-size:12px;margin-bottom:6px">── SOUNDS ──</div>`;
  html+=`<div id="_sfxBtns" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px"></div>`;
  html+=`<div style="margin-top:4px;color:#FFFF55;font-family:monospace;font-size:12px;margin-bottom:6px">── CAT ANIMATIONS ──</div>`;
  html+=`<canvas id="_animPreview" width="640" height="240" style="image-rendering:pixelated;width:640px;height:240px;background:#1a1a2e;border:1px solid #444;display:block"></canvas>`;
  document.getElementById('_tov_body').innerHTML=html;
  document.getElementById('_tov').style.display='flex';
  // Sound test buttons
  const _sfxNames=Object.keys(sfx);
  const _btnContainer=document.getElementById('_sfxBtns');
  const _btnStyle='background:#222;color:#AAFFAA;border:1px solid #555;padding:3px 8px;cursor:pointer;font-family:monospace;font-size:11px';
  for(const sn of _sfxNames){
    const b=document.createElement('button');
    b.textContent=sn; b.style.cssText=_btnStyle;
    b.onclick=()=>{ea();if(masterGain)masterGain.gain.value=1.0;sfx[sn]();};
    _btnContainer.appendChild(b);
  }

  const _anims=[
    {name:"walk",    fn:(cx,cy,af)=>{drawNormalCat(cx,cy,"right",af%4,true);}},
    {name:"sleep",   fn:(cx,cy,af)=>{drawSleepCat(cx,cy);}},
    {name:"stretch", fn:(cx,cy,af)=>{drawStretchCat(cx,cy,af%60);}},
    {name:"jump",    fn:(cx,cy,af)=>{const dy=Math.round(-Math.sin((af%36)/36*Math.PI)*12);drawNormalCat(cx,cy+dy,"right",0,false);}},
    {name:"scratch", fn:(cx,cy,af)=>{drawScratchCat(cx,cy,af%40);}},
    {name:"groom",   fn:(cx,cy,af)=>{drawGroomCat(cx,cy,af%60);}},
    {name:"eat",     fn:(cx,cy,af)=>{drawEatCat(cx,cy,af%40);}},
    {name:"meow",    fn:(cx,cy,af)=>{drawMeowCat(cx,cy,af%30);}},
    {name:"hiss",    fn:(cx,cy,af)=>{drawHissCat(cx+4,cy);}},
    {name:"purr",    fn:(cx,cy,af)=>{const vib=(af%4<2)?1:0;drawNormalCat(cx+vib,cy,"right",0,false);const px2=cx+16;if(af%8<4){X.fillStyle=E.white;X.fillRect(px2,cy+4,2,1);X.fillRect(px2+2,cy+6,2,1);}}},
    {name:"run",     fn:(cx,cy,af)=>{drawNormalCat(cx,cy,"right",Math.floor(af/2)%4,true);}},
    {name:"alert",   fn:(cx,cy,af)=>{drawAlertCat(cx,cy,af%28);}},
    {name:"drawer",  fn:(cx,cy,af)=>{drawDrawerSleepCat(cx,cy,af%60);}},
  ];
  // 7 per row, 2 rows, 2× scale. Canvas=640×240px, logical after scale=320×120.
  const COLS=7, SCALE=2;
  const cellW=Math.floor(320/COLS); // ~45px per cell in logical coords
  const ROW_H=55; // row height in logical coords — 2 rows × 55 = 110 < 120, fits fine
  let _af2=0;
  const _gameX=X;
  function _drawPreviews(){
    const pc=document.getElementById('_animPreview');
    if(!pc){return;}
    const px=pc.getContext('2d');
    X=px;
    px.fillStyle="#1a1a2e";px.fillRect(0,0,640,240);
    px.save();
    px.scale(SCALE,SCALE);
    for(let i=0;i<_anims.length;i++){
      const row=Math.floor(i/COLS), col=i%COLS;
      const cx=col*cellW+Math.floor(cellW/2)-7;
      const cy=row*ROW_H+24;
      try{ _anims[i].fn(cx,cy,_af2); }catch(e){}
      px.fillStyle="#667";px.font="5px monospace";
      px.fillText(_anims[i].name, col*cellW+2, row*ROW_H+ROW_H-4);
    }
    px.restore();
    X=_gameX;
    _af2++;
    window._animPreviewRaf=requestAnimationFrame(_drawPreviews);
  }
  if(window._animPreviewRaf) cancelAnimationFrame(window._animPreviewRaf);
  window._animPreviewRaf=null;
  _drawPreviews();
} // end runTests

// Start cat asleep
P.layer="floor"; P.x=160; P.y=FLOOR-16;
startAnim("sleep",9999,null);
setTimeout(()=>sfx.fanfare(),400);
showMsg("You are a distinguished grey cat. Your kingdom spans three rooms. You awake from your slumber.",()=>{
  // Wake the cat up
  anim={type:null,frame:0,maxFrames:0,onDone:null,jumpUp:false};
  sfx.stretch();
  startAnim("stretch",60,null);
});
showMsg("Something reaches your nose. There is a silver serving lid on the dining table — and whatever is underneath it smells absolutely extraordinary.");
showMsg("Arrow keys to move. Just start typing to enter commands. Good luck.");
requestAnimationFrame(loop);
</script>
</body>
</html>
